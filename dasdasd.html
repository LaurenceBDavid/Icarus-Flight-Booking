<!-- ====== Compact Booking Form with Dropdown Suggestions ====== -->
<style>
  /* --- form layout (match your site styles as needed) --- */
  .booking-form { max-width: 980px; margin-top: 18px; }
  .booking-grid { display: grid; grid-template-columns: 1fr 1fr 180px 180px 140px; gap: 12px; align-items: end; }

  .input-group { position: relative; }
  .input-group label { display:block; font-size:0.75rem; color:#666; margin-bottom:6px; }
  .airport-input, .pass-input, .date-input, .select-input {
    width:100%; padding:12px 12px; border-radius:8px; border:1px solid #ddd; font-size:0.95rem;
    background: #fff;
  }
  .airport-input:focus { outline: none; border-color: #cfcfcf; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

  .view-btn { background:#d4af37; color:#fff; border:none; padding:12px 18px; border-radius:10px; cursor:pointer; font-weight:600; }

  /* --- suggestions dropdown --- */
  .suggestions {
    position: absolute;
    left: 0; right: 0;
    top: calc(100% + 8px);
    z-index: 1200;
    background: #fff;
    border: 1px solid #e6e6e6;
    border-radius: 10px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    max-height: 260px;
    overflow: auto;
    padding: 12px;
    display: none;
  }

  .suggestions.visible { display: block; }

  .suggest-section { margin-bottom: 10px; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .chip {
    padding:8px 12px; border-radius:8px; background:#f7f7f7; border:1px solid #efefef; cursor:pointer; font-size:0.9rem;
  }
  .chip:hover { background:#eee; }

  .suggest-list { list-style:none; margin:8px 0 0 0; padding:0; }
  .suggest-item {
    padding:10px; border-radius:8px; display:flex; justify-content:space-between; gap:8px; align-items:center;
    cursor:pointer; font-size:0.95rem; color:#222;
  }
  .suggest-item + .suggest-item { margin-top:6px; }
  .suggest-item:hover, .suggest-item.active { background:#f4f4f4; }

  .recent-title { font-size:0.82rem; color:#777; margin-bottom:6px; }
  .small-muted { font-size:0.82rem; color:#888; }

  /* keyboard focus outline */
  .suggest-item:focus { outline: 2px solid rgba(212,175,55,0.25); }

  @media (max-width:900px) {
    .booking-grid { grid-template-columns: 1fr; }
    .view-btn { width:100%; }
  }
</style>

<div class="booking-form">
  <form id="bookingForm" action="result.html" method="GET" autocomplete="off">
    <div class="booking-grid">

      <!-- FROM -->
      <div class="input-group" style="grid-column: 1 / span 1;">
        <label for="fromInput">From</label>
        <input id="fromInput" name="from" class="airport-input" placeholder="Enter origin (city or airport)" />
        <div class="suggestions" id="fromSuggestions" aria-hidden="true"></div>
      </div>

      <!-- TO -->
      <div class="input-group" style="grid-column: 2 / span 1;">
        <label for="toInput">To</label>
        <input id="toInput" name="to" class="airport-input" placeholder="Enter destination (city or airport)" />
        <div class="suggestions" id="toSuggestions" aria-hidden="true"></div>
      </div>

      <!-- DEPARTURE -->
      <div class="input-group">
        <label for="departure">Departure</label>
        <input id="departure" name="departure" class="date-input" type="date" />
      </div>

      <!-- RETURN -->
      <div class="input-group">
        <label for="return">Return</label>
        <input id="return" name="return" class="date-input" type="date" />
      </div>

      <!-- SEARCH BUTTON / PASSENGERS (mobile stacked) -->
      <div class="input-group" style="display:flex; gap:8px; align-items:center;">
        <select name="passengers" class="select-input" aria-label="Passengers">
          <option value="1">1 Passenger, Economy</option>
          <option value="2">2 Passengers, Economy</option>
          <option value="3">3 Passengers, Economy</option>
        </select>
        <button type="submit" class="view-btn">Search</button>
      </div>
    </div>
  </form>
</div>

<script>
/* ===== Compact dropdown airport selector =====
   - Shows suggestions on focus
   - Filters while typing
   - Select by click or Enter
   - Recent searches saved in localStorage (max 6)
   - Keyboard navigation (Up/Down/Enter/Esc)
*/

(function() {
  const popularCities = [
    { name: "Manila, Philippines", code: "MNL" },
    { name: "Cebu, Philippines", code: "CEB" },
    { name: "Iloilo, Philippines", code: "ILO" },
    { name: "Davao City, Philippines", code: "DVO" },
    { name: "Clark, Philippines", code: "CRK" },
    { name: "Bacolod, Philippines", code: "BCD" },
    { name: "Bohol (Tagbilaran), Philippines", code: "TAG" },
    { name: "Boracay (Caticlan), Philippines", code: "MPH" },
    { name: "Singapore", code: "SIN" },
    { name: "Tokyo, Japan", code: "TYO" },
    { name: "Kuala Lumpur, Malaysia", code: "KUL" },
    { name: "Hong Kong", code: "HKG" }
  ];

  // Find inputs and suggestions containers
  const inputs = [
    { input: document.getElementById('fromInput'), box: document.getElementById('fromSuggestions') },
    { input: document.getElementById('toInput'), box: document.getElementById('toSuggestions') }
  ];

  const RECENT_KEY = 'icarus_recent_searches_v1';

  // load recent (array of strings)
  function loadRecent() {
    try {
      return JSON.parse(localStorage.getItem(RECENT_KEY)) || [];
    } catch {
      return [];
    }
  }
  function saveRecent(value) {
    if (!value) return;
    let arr = loadRecent();
    // remove duplicates
    arr = arr.filter(x => x !== value);
    arr.unshift(value);
    if (arr.length > 6) arr = arr.slice(0,6);
    localStorage.setItem(RECENT_KEY, JSON.stringify(arr));
  }

  // create suggestion HTML
  function renderSuggestions(box, currentValue) {
    const recent = loadRecent();

    // container
    const fragment = document.createDocumentFragment();

    // Popular chips
    const section1 = document.createElement('div');
    section1.className = 'suggest-section';
    const p1 = document.createElement('div'); p1.className = 'recent-title'; p1.textContent = 'Popular destinations';
    section1.appendChild(p1);

    const chipRow = document.createElement('div'); chipRow.className = 'chips';
    popularCities.forEach(city => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip';
      chip.textContent = city.name.split(',')[0]; // show first part
      chip.dataset.full = `${city.name} (${city.code})`;
      chip.addEventListener('click', () => {
        box._selectFn && box._selectFn(chip.dataset.full);
      });
      chipRow.appendChild(chip);
    });
    section1.appendChild(chipRow);
    fragment.appendChild(section1);

    // Recent
    if (recent.length) {
      const section2 = document.createElement('div');
      section2.className = 'suggest-section';
      const p2 = document.createElement('div'); p2.className = 'recent-title'; p2.textContent = 'Recent searches';
      section2.appendChild(p2);

      const list = document.createElement('ul'); list.className = 'suggest-list';
      recent.forEach(it => {
        const li = document.createElement('li'); li.className = 'suggest-item';
        li.tabIndex = 0;
        li.textContent = it;
        li.addEventListener('click', () => { box._selectFn && box._selectFn(it); });
        list.appendChild(li);
      });
      section2.appendChild(list);
      fragment.appendChild(section2);
    }

    // Filtered matches
    const query = (currentValue || '').trim().toLowerCase();
    if (query) {
      const matches = popularCities.filter(c => (c.name + ' ' + c.code).toLowerCase().includes(query));
      if (matches.length) {
        const section3 = document.createElement('div');
        section3.className = 'suggest-section';
        const p3 = document.createElement('div'); p3.className = 'recent-title'; p3.textContent = 'Matches';
        section3.appendChild(p3);

        const list2 = document.createElement('ul'); list2.className = 'suggest-list';
        matches.forEach(c => {
          const li = document.createElement('li'); li.className = 'suggest-item';
          li.tabIndex = 0;
          li.innerHTML = `<div>${c.name}</div><div class="small-muted">${c.code}</div>`;
          li.addEventListener('click', () => { box._selectFn && box._selectFn(`${c.name} (${c.code})`); });
          list2.appendChild(li);
        });
        section3.appendChild(list2);
        fragment.appendChild(section3);
      }
    }

    // empty state when query yields nothing
    if (query && !fragment.querySelector('.suggest-list')) {
      const none = document.createElement('div'); none.className = 'suggest-section';
      none.innerHTML = `<div class="recent-title">No matches — try another name</div>`;
      fragment.appendChild(none);
    }

    // clear and append
    box.innerHTML = '';
    box.appendChild(fragment);
  }

  // show suggestions for a given input+box
  function show(box, input) {
    renderSuggestions(box, input.value);
    box.classList.add('visible');
    box.setAttribute('aria-hidden','false');

    // setup select handler for this box
    box._selectFn = function(val) {
      input.value = val;
      saveRecent(val);
      hide(box);
      input.focus();
    };

    // keyboard internal navigation
    let items = [];
    let idx = -1;

    function refreshItems() {
      items = Array.from(box.querySelectorAll('.suggest-item'));
    }
    function setActive(newIdx) {
      items.forEach((el,i) => el.classList.toggle('active', i === newIdx));
      idx = newIdx;
      if (items[idx]) items[idx].scrollIntoView({block:'nearest'});
    }

    refreshItems();

    // key handling for arrow/enter/esc
    function onKey(e) {
      if (!box.classList.contains('visible')) return;
      const key = e.key;
      if (key === 'ArrowDown') {
        e.preventDefault(); refreshItems(); setActive(Math.min(items.length-1, (idx+1) || 0));
      } else if (key === 'ArrowUp') {
        e.preventDefault(); refreshItems(); setActive(Math.max(0, (idx-1)));
      } else if (key === 'Enter') {
        if (idx >=0 && items[idx]) {
          e.preventDefault();
          items[idx].click();
        } else {
          // if nothing selected, and there's a first match element, choose it
          const first = box.querySelector('.suggest-item');
          if (first) { e.preventDefault(); first.click(); }
        }
      } else if (key === 'Escape') {
        hide(box);
        input.blur();
      }
    }

    // rebind key events while dropdown open
    input._onKey = onKey;
    window.addEventListener('keydown', onKey);
    box._cleanup = () => {
      window.removeEventListener('keydown', onKey);
    };
  }

  function hide(box) {
    box.classList.remove('visible');
    box.setAttribute('aria-hidden','true');
    if (box._cleanup) { box._cleanup(); box._cleanup = null; }
  }

  // attach handlers for each input + its suggestion box
  inputs.forEach(({input, box}) => {
    // show on focus
    input.addEventListener('focus', () => { renderSuggestions(box, input.value); show(box, input); });

    // filter while typing
    input.addEventListener('input', () => { renderSuggestions(box, input.value); });

    // click outside to close
    document.addEventListener('click', (e) => {
      if (!input.contains(e.target) && !box.contains(e.target)) hide(box);
    });

    // on blur slightly delayed to allow click to register
    input.addEventListener('blur', () => {
      setTimeout(() => { if (!box.contains(document.activeElement)) hide(box); }, 180);
    });

    // allow selecting a full code by typing "Manila (MNL)" style
    // pressing Enter when focused on empty suggestions will attempt to save typed value
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        // if suggestions visible and no active item, but user typed something, accept typed
        if (box.classList.contains('visible')) {
          const first = box.querySelector('.suggest-item');
          if (!first) {
            saveRecent(input.value.trim());
            hide(box);
          }
        }
      }
    });
  });

  // expose: if needed elsewhere
  window.icarusAirportSelector = { loadRecent, saveRecent };

})();
</script>
